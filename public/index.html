<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guessing Game</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e3e;
      --accent: #7c6ef7;
      --accent-dim: #5a4fd4;
      --gold: #f5c842;
      --green: #4caf82;
      --red: #e05c5c;
      --text: #e8e8f0;
      --text-dim: #7a7a9a;
      --system: #4a9eff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Screens ── */
    .screen { display: none; height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── Landing ── */
    #landing {
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #1a1230 0%, var(--bg) 70%);
    }

    .landing-inner { text-align: center; max-width: 420px; padding: 32px; }

    .game-icon { font-size: 64px; margin-bottom: 16px; }

    h1 {
      font-size: 40px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle { color: var(--text-dim); font-size: 15px; margin-bottom: 40px; }

    .input-group { margin-bottom: 16px; text-align: left; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,110,247,0.15);
    }

    input::placeholder { color: #3a3a5a; }

    .btn-group { display: flex; gap: 12px; margin-top: 8px; }

    .btn {
      flex: 1;
      padding: 13px 20px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dim); transform: translateY(-1px); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-dim); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .join-row { display: flex; gap: 8px; }
    .join-row input { flex: 1; }
    .join-row .btn { flex: none; padding: 12px 20px; }

    /* ── Game screen ── */
    #game { flex-direction: row; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .session-code {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .session-code span {
      color: var(--gold);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 3px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 6px;
    }

    .status-waiting { background: rgba(124,110,247,0.15); color: var(--accent); }
    .status-active { background: rgba(76,175,130,0.15); color: var(--green); }
    .status-ended { background: rgba(224,92,92,0.15); color: var(--red); }

    .players-section { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .players-title { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

    .player-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(46,46,62,0.5);
    }

    .player-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-dim), #2a1a5a);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      flex-shrink: 0;
      position: relative;
    }

    .player-avatar.master::after {
      content: '👑';
      position: absolute;
      top: -6px; right: -6px;
      font-size: 10px;
    }

    .player-info { flex: 1; min-width: 0; }
    .player-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-name.you { color: var(--accent); }
    .player-score { font-size: 11px; color: var(--text-dim); }

    /* Game controls */
    .game-controls {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .game-controls textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      resize: none;
      outline: none;
      height: 60px;
    }

    .game-controls textarea:focus { border-color: var(--accent); }
    .game-controls textarea::placeholder { color: #3a3a5a; }

    .ctrl-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn-green { background: var(--green); color: #fff; }
    .ctrl-btn-green:hover { background: #3a9060; }
    .ctrl-btn-accent { background: var(--accent); color: #fff; }
    .ctrl-btn-accent:hover { background: var(--accent-dim); }
    .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .chat-title { font-size: 15px; font-weight: 600; }
    .chat-subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    .timer-display {
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
    }

    .timer-display.urgent { color: var(--red); animation: blink 0.5s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .msg.system { align-self: center; max-width: 90%; }
    .msg.mine { align-self: flex-end; }
    .msg.other { align-self: flex-start; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.system .msg-bubble {
      background: rgba(74,158,255,0.1);
      border: 1px solid rgba(74,158,255,0.2);
      color: var(--system);
      text-align: center;
      border-radius: 10px;
    }

    .msg.mine .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-radius: 14px 14px 4px 14px;
    }

    .msg.other .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
    }

    .msg.guess .msg-bubble {
      background: rgba(245,200,66,0.1);
      border: 1px solid rgba(245,200,66,0.2);
      color: var(--gold);
    }

    .msg-meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; padding: 0 4px; }
    .msg.mine .msg-meta { text-align: right; }

    /* Attempts indicator */
    .attempts-bar {
      display: flex;
      gap: 5px;
      padding: 8px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      align-items: center;
    }

    .attempt-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      transition: background 0.2s;
    }

    .attempt-dot.used { background: var(--red); }
    .attempts-label { font-size: 12px; color: var(--text-dim); margin-left: 6px; }

    /* Chat input */
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input-area input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 18px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input-area input:focus { border-color: var(--accent); }
    .chat-input-area input::placeholder { color: #3a3a5a; }
    .chat-input-area input:disabled { opacity: 0.4; }

    .send-btn {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--accent-dim); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Toast */
    #toast {
      position: fixed; top: 20px; right: 20px;
      padding: 12px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      z-index: 9999; opacity: 0;
      transform: translateX(20px);
      transition: all 0.3s; pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateX(0); }
    #toast.error { background: #2a0d0d; border: 1px solid var(--red); color: var(--red); }
    #toast.success { background: #0d2419; border: 1px solid var(--green); color: var(--green); }
    #toast.info { background: #0d1a2a; border: 1px solid var(--system); color: var(--system); }

    @media (max-width: 600px) {
      body { overflow: hidden; }
      #game { flex-direction: column; height: 100vh; overflow: hidden; }

      /* Sidebar becomes a compact top bar */
      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex-direction: column;
        flex-shrink: 0;
      }

      .sidebar-header { padding: 8px 14px; }
      .session-code span { font-size: 13px; letter-spacing: 2px; }
      .status-badge { font-size: 10px; padding: 2px 8px; }

      /* Collapse players list on mobile */
      .players-section {
        padding: 6px 14px;
        max-height: 80px;
        overflow-y: auto;
      }

      .player-item { padding: 4px 0; }
      .player-avatar { width: 26px; height: 26px; font-size: 11px; }
      .player-name { font-size: 12px; }
      .player-score { font-size: 10px; }

      /* Game controls compact */
      .game-controls {
        padding: 8px 14px;
        gap: 6px;
        border-top: 1px solid var(--border);
      }

      .game-controls textarea { height: 36px; font-size: 12px; padding: 8px 10px; }
      .ctrl-btn { font-size: 12px; padding: 7px; }

      /* Chat takes remaining space */
      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .chat-header { padding: 8px 14px; }
      .chat-title { font-size: 13px; }
      .chat-subtitle { font-size: 11px; }
      .timer-display { font-size: 22px; }

      /* Messages scroll area */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px 14px;
        -webkit-overflow-scrolling: touch;
      }

      /* Attempts bar */
      .attempts-bar { padding: 6px 14px; }

      /* Chat input - LARGE and prominent on mobile */
      .chat-input-area {
        padding: 10px 14px;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
        gap: 8px;
        background: var(--surface);
        border-top: 2px solid var(--accent);
        flex-shrink: 0;
      }

      .chat-input-area input {
        font-size: 16px; /* prevents iOS zoom */
        padding: 12px 16px;
        border-radius: 24px;
        border: 1px solid var(--accent);
      }

      .send-btn {
        width: 48px;
        height: 48px;
        font-size: 20px;
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ── Landing Screen ── -->
<div id="landing" class="screen active">
  <div class="landing-inner">
    <div class="game-icon">🎯</div>
    <h1>Guessing Game</h1>
    <p class="subtitle">A live multiplayer guessing game for you and your friends</p>

    <div class="input-group">
      <label>Your Username</label>
      <input type="text" id="usernameInput" placeholder="Enter your name" maxlength="20"/>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="createSession()">🎮 Create Game</button>
    </div>

    <div class="divider">or join a game</div>

    <div class="join-row">
      <input type="text" id="codeInput" placeholder="Enter session code" maxlength="6" style="text-transform:uppercase"/>
      <button class="btn btn-secondary" onclick="joinSession()">Join</button>
    </div>
  </div>
</div>

<!-- ── Game Screen ── -->
<div id="game" class="screen">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="session-code">Session <span id="sessionCode">------</span></div>
      <div id="statusBadge" class="status-badge status-waiting">⏳ Waiting</div>
    </div>

    <div class="players-section">
      <div class="players-title">Players</div>
      <div id="playersList"></div>
    </div>

    <!-- Game master controls -->
    <div class="game-controls" id="masterControls" style="display:none">
      <textarea id="questionInput" placeholder="Type your question..."></textarea>
      <textarea id="answerInput" placeholder="The answer (hidden from players)..." style="height:44px"></textarea>
      <button class="ctrl-btn ctrl-btn-accent" id="setQuestionBtn" onclick="setQuestion()">📝 Set Question</button>
      <button class="ctrl-btn ctrl-btn-green" id="startBtn" onclick="startGame()" disabled>▶ Start Game</button>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="chat-header">
      <div>
        <div class="chat-title" id="chatTitle">Game Lobby</div>
        <div class="chat-subtitle" id="chatSubtitle">Waiting for players...</div>
      </div>
      <div class="timer-display" id="timerDisplay" style="display:none">60</div>
    </div>

    <div class="messages" id="messages"></div>

    <!-- Attempts bar (players only) -->
    <div class="attempts-bar" id="attemptsBar" style="display:none">
      <div class="attempt-dot" id="dot1"></div>
      <div class="attempt-dot" id="dot2"></div>
      <div class="attempt-dot" id="dot3"></div>
      <span class="attempts-label">attempts remaining</span>
    </div>

    <div class="chat-input-area">
      <input type="text" id="messageInput" placeholder="Type a message or your guess..." maxlength="200"/>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
  const socket = io();
  let myUsername = '';
  let sessionCode = '';
  let isGameMaster = false;
  let gameActive = false;
  let myAttempts = 0;
  let timerInterval = null;
  let timeLeft = 60;

  // ── Toast ──────────────────────────────────────────────────────
  const toastEl = document.getElementById('toast');
  let toastTimeout;

  function showToast(msg, type = 'info') {
    clearTimeout(toastTimeout);
    toastEl.textContent = msg;
    toastEl.className = `show ${type}`;
    toastTimeout = setTimeout(() => toastEl.className = '', 3000);
  }

  // ── Switch screens ─────────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Create session ─────────────────────────────────────────────
  async function createSession() {
    const username = document.getElementById('usernameInput').value.trim();
    if (!username) return showToast('Enter your username', 'error');

    try {
      const res = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username }),
      });
      const data = await res.json();
      if (!res.ok) return showToast(data.error, 'error');

      myUsername = username;
      sessionCode = data.code;
      isGameMaster = true;
      socket.emit('join_session', { code: sessionCode, username });
    } catch (e) {
      showToast('Failed to create session', 'error');
    }
  }

  // ── Join session ───────────────────────────────────────────────
  async function joinSession() {
    const username = document.getElementById('usernameInput').value.trim();
    const code = document.getElementById('codeInput').value.trim().toUpperCase();
    if (!username) return showToast('Enter your username', 'error');
    if (!code) return showToast('Enter a session code', 'error');

    try {
      const res = await fetch(`/api/sessions/${code}`);
      const data = await res.json();
      if (!res.ok) return showToast(data.error, 'error');
      if (data.status === 'active') return showToast('Game already in progress', 'error');

      myUsername = username;
      sessionCode = code;
      isGameMaster = false;
      socket.emit('join_session', { code, username });
    } catch (e) {
      showToast('Failed to join session', 'error');
    }
  }

  // ── Enter game screen ──────────────────────────────────────────
  function enterGame(session) {
    document.getElementById('sessionCode').textContent = sessionCode;
    showScreen('game');
    updatePlayers(session.players);
    if (isGameMaster) {
      document.getElementById('masterControls').style.display = 'flex';
    }
    addMessage({ type: 'system', message: `Welcome to session ${sessionCode}! Share this code with your friends.` });
  }

  // ── Update players list ────────────────────────────────────────
  function updatePlayers(players) {
    const list = document.getElementById('playersList');
    list.innerHTML = players.map(p => `
      <div class="player-item">
        <div class="player-avatar ${p.isGameMaster ? 'master' : ''}">${p.username[0].toUpperCase()}</div>
        <div class="player-info">
          <div class="player-name ${p.username === myUsername ? 'you' : ''}">
            ${escHtml(p.username)} ${p.username === myUsername ? '(you)' : ''}
          </div>
          <div class="player-score">⭐ ${p.score} pts</div>
        </div>
      </div>
    `).join('');

    document.getElementById('chatSubtitle').textContent = `${players.length} player(s) connected`;
  }

  // ── Add message to chat ────────────────────────────────────────
  function addMessage({ type, username, message }) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');

    let cls = 'msg system';
    if (type === 'chat' || type === 'guess') {
      cls = username === myUsername ? 'msg mine' : `msg other ${type === 'guess' ? 'guess' : ''}`;
    }
    if (type === 'guess') cls += ' guess';

    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const showMeta = type !== 'system';

    div.className = cls;
    div.innerHTML = `
      <div class="msg-bubble">${escHtml(message)}</div>
      ${showMeta ? `<div class="msg-meta">${username !== myUsername ? escHtml(username) + ' · ' : ''}${time}</div>` : ''}
    `;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  // ── Set question (game master) ─────────────────────────────────
  function setQuestion() {
    const question = document.getElementById('questionInput').value.trim();
    const answer = document.getElementById('answerInput').value.trim();
    if (!question) return showToast('Enter a question', 'error');
    if (!answer) return showToast('Enter the answer', 'error');
    console.log('Emitting set_question', { code: sessionCode, question, answer });
    socket.emit('set_question', { code: sessionCode, question, answer });
  }

  // ── Start game (game master) ───────────────────────────────────
  function startGame() {
    console.log('Emitting start_game', { code: sessionCode });
    if (!sessionCode) return showToast('No active session', 'error');
    socket.emit('start_game', { code: sessionCode });
  }

  // ── Send message / guess ───────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById('messageInput');
    const msg = input.value.trim();
    if (!msg) return;

    if (gameActive && !isGameMaster) {
      socket.emit('guess', { code: sessionCode, guess: msg });
    } else {
      socket.emit('chat', { code: sessionCode, message: msg });
    }
    input.value = '';
  }

  // ── Timer ──────────────────────────────────────────────────────
  function startTimer(seconds) {
    timeLeft = seconds;
    const timerEl = document.getElementById('timerDisplay');
    timerEl.style.display = 'block';
    timerEl.textContent = timeLeft;

    timerInterval = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft;
      timerEl.className = 'timer-display' + (timeLeft <= 10 ? ' urgent' : '');
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timerEl.style.display = 'none';
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    document.getElementById('timerDisplay').style.display = 'none';
  }

  // ── Update attempts bar ────────────────────────────────────────
  function updateAttempts(used) {
    document.getElementById('attemptsBar').style.display = 'flex';
    for (let i = 1; i <= 3; i++) {
      const dot = document.getElementById(`dot${i}`);
      dot.className = 'attempt-dot' + (i <= used ? ' used' : '');
    }
  }

  // ── Update status badge ────────────────────────────────────────
  function updateStatus(status) {
    const badge = document.getElementById('statusBadge');
    const map = {
      waiting: ['status-waiting', '⏳ Waiting'],
      active: ['status-active', '🎮 Active'],
      ended: ['status-ended', '🏁 Ended'],
    };
    const [cls, label] = map[status] || map.waiting;
    badge.className = `status-badge ${cls}`;
    badge.textContent = label;
  }

  // ── Socket events ──────────────────────────────────────────────
  socket.on('joined', ({ session }) => {
    document.getElementById('sessionCode').textContent = sessionCode;
    showScreen('game');
    updatePlayers(session.players);
    updateStatus(session.status);
    if (isGameMaster) {
      document.getElementById('masterControls').style.display = 'flex';
    }
    addMessage({ type: 'system', message: `Welcome to session ${sessionCode}! Share this code with your friends.` });
  });

  socket.on('player_update', ({ players, message }) => {
    updatePlayers(players);
    addMessage({ type: 'system', message });
  });

  socket.on('question_set', ({ message }) => {
    showToast(message, 'success');
    document.getElementById('startBtn').disabled = false;
    addMessage({ type: 'system', message: '📝 Game master has set a question!' });
  });

  socket.on('game_started', ({ question, players, timeLimit }) => {
    gameActive = true;
    myAttempts = 0;
    updatePlayers(players);
    updateStatus('active');
    document.getElementById('chatTitle').textContent = '🎮 Game in Progress';
    startTimer(timeLimit);

    if (!isGameMaster) {
      updateAttempts(0);
      document.getElementById('messageInput').placeholder = 'Type your guess...';
    } else {
      document.getElementById('messageInput').placeholder = 'Chat with players...';
      document.getElementById('masterControls').style.display = 'none';
    }
  });

  socket.on('chat_message', (data) => {
    addMessage(data);
  });

  socket.on('wrong_guess', ({ message, attemptsLeft }) => {
    myAttempts = 3 - attemptsLeft;
    updateAttempts(myAttempts);
    addMessage({ type: 'system', message });
    if (attemptsLeft === 0) {
      document.getElementById('messageInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
    }
  });

  socket.on('game_over', ({ reason, winner, answer, players, message }) => {
    gameActive = false;
    stopTimer();
    updateStatus('ended');
    updatePlayers(players);
    addMessage({ type: 'system', message });

    document.getElementById('attemptsBar').style.display = 'none';
    document.getElementById('messageInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  });

  socket.on('new_game_master', ({ gameMaster, players, message }) => {
    addMessage({ type: 'system', message });
    updatePlayers(players);
    updateStatus('waiting');

    document.getElementById('chatTitle').textContent = 'Game Lobby';
    document.getElementById('messageInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;

    // Check if I'm the new game master
    if (gameMaster === myUsername) {
      isGameMaster = true;
      document.getElementById('masterControls').style.display = 'flex';
      document.getElementById('startBtn').disabled = true;
      document.getElementById('questionInput').value = '';
      document.getElementById('answerInput').value = '';
      showToast('You are the new game master!', 'success');
    } else {
      isGameMaster = false;
      document.getElementById('masterControls').style.display = 'none';
      document.getElementById('messageInput').placeholder = 'Type a message...';
    }
  });

  socket.on('error', (msg) => showToast(msg, 'error'));

  // ── Enter key to send ──────────────────────────────────────────
  document.getElementById('messageInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });
  document.getElementById('usernameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') createSession();
  });
  document.getElementById('codeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinSession();
  });

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
